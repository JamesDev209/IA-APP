<style>
body {
  background: #0b0f19;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  margin-top: 100px;
}

.scoreboard {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111827;
  padding: 20px 40px;
  border-radius: 15px;
  width: 600px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  overflow: hidden;
}

.team {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
}

.team img {
  width: 40px;
  height: 40px;
}

.center {
  text-align: center;
  z-index: 2;
}

.score {
  font-size: 40px;
  font-weight: bold;
}

#time {
  font-size: 18px;
  color: #9ca3af;
}

/* 🔥 partículas */
.particles, .cluster {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  pointer-events: none;
}

.number {
  position: absolute;
  font-size: 12px;
  color: #22c55e;
  opacity: 0.7;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translate(0, 0); }
  to { transform: translate(var(--x), var(--y)); }
}
</style>

<div class="scoreboard">

  <!-- partículas -->
  <div class="particles" id="particles"></div>
  <div class="cluster" id="cluster"></div>

  <div class="team">
    <img src="https://tse1.mm.bing.net/th/id/OIP.-BQOdZvw8nSdKrZwhxdJQwHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" />
    <span>asvel</span>
  </div>

  <div class="center">
    <div id="time">00:00</div>
    <div class="score">
      <span id="scoreA">0</span> - <span id="scoreB">0</span>
    </div>
  </div>

  <div class="team">
    <span>Olympiakos</span>
    <img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg" />
  </div>
</div>

<script>
let seconds = 0;

function updateTime() {
  seconds++;
  let min = Math.floor(seconds / 60);
  let sec = seconds % 60;

  document.getElementById("time").textContent =
    `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

setInterval(updateTime, 1000);

// goles fake
setTimeout(() => {
  document.getElementById("scoreA").textContent = 1;
}, 4000);

setTimeout(() => {
  document.getElementById("scoreB").textContent = 1;
}, 9000);

// 🔥 partículas
const container = document.getElementById("particles");
const cluster = document.getElementById("cluster");

// 100 números random
for (let i = 0; i < 100; i++) {
  let el = document.createElement("div");
  el.className = "number";
  el.textContent = "100";

  let x = Math.random() * 600 - 300;
  let y = Math.random() * 300 - 150;

  el.style.left = Math.random() * 100 + "%";
  el.style.top = Math.random() * 100 + "%";
  el.style.setProperty("--x", x + "px");
  el.style.setProperty("--y", y + "px");
  el.style.animationDuration = (Math.random() * 6 + 4) + "s";

  container.appendChild(el);
}

// 20 en bola
for (let i = 0; i < 20; i++) {
  let el = document.createElement("div");
  el.className = "number";
  el.textContent = "100";

  let angle = Math.random() * Math.PI * 2;
  let radius = Math.random() * 40;

  let x = Math.cos(angle) * radius;
  let y = Math.sin(angle) * radius;

  el.style.left = "50%";
  el.style.top = "50%";
  el.style.setProperty("--x", x + "px");
  el.style.setProperty("--y", y + "px");
  el.style.animationDuration = "3s";

  cluster.appendChild(el);
}
</script>
